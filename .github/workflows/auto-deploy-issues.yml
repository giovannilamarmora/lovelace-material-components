name: 🚀 Auto Deploy Issues on Release

on:
  release:
    types: [published]

jobs:
  update-issues:
    name: 📝 Update & Close Issues
    runs-on: ubuntu-latest

    steps:
      - name: 📝 Parse description and update issues
        uses: actions/github-script@v7
        env:
          # Puoi usare il secret personalizzato o quello standard GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        with:
          github-token: ${{ env.GITHUB_TOKEN }}
          script: |
            // Recuperiamo subito i dati direttamente dal contesto dell'evento
            const releaseBody = context.payload.release.body || '';
            const tagName = context.payload.release.tag_name;
            const { owner, repo } = context.repo;

            console.log(`📝 Tag: ${tagName}`);
            console.log(`📄 Description:\n${releaseBody}\n`);

            // Cerchiamo i riferimenti alle issue (#12, fixes #12, resolve #12 ecc.)
            const regex = /#\d+|issue\s*\d+|fix(?:es|ed)?\s*#?\d+|resolve(?:s|d)?\s*#?\d+/gi;
            const matches = releaseBody.match(regex);

            if (!matches) {
              console.log("ℹ️ No issues found in release description.");
              return; // Esce dallo script senza errori
            }

            const issueNumbers = [...new Set(matches.map(m => m.replace(/[^0-9]/g, '')))].filter(Boolean);

            if (issueNumbers.length === 0) {
              console.log("⚠️ No valid issue numbers found.");
              return;
            }

            // Formattiamo la data
            const deployDate = new Date();
            const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            const formattedDate = `${deployDate.getDate()} ${months[deployDate.getMonth()]} ${deployDate.getFullYear()}`;

            console.log(`🎯 Found ${issueNumbers.length} issue(s) to update: ${issueNumbers.map(n => '#' + n).join(', ')}`);

            // Aggiorniamo le issue
            for (const issueNumber of issueNumbers) {
              console.log(`\n🔄 Updating issue #${issueNumber}...`);
              try {
                // 'github' è l'istanza Octokit già autenticata fornita dall'action
                const { data: issue } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber
                });

                const currentLabels = issue.labels.map(l => l.name);
                const newLabels = [
                  ...new Set(
                    currentLabels
                      .filter(l => l !== '📦 To be deployed' && l !== '⏳ in progress')
                      .concat(['🚀 deployed', '✅ done'])
                  )
                ];

                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: newLabels,
                  state: 'closed'
                });

                const releaseUrl = context.payload.release.html_url;

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `✅ Automatically closed after deploying tag **${tagName}**.\n\n` +
                        `🗓 Deployment date: ${formattedDate}\n` +
                        (releaseUrl ? `📦 Related release: [${tagName}](${releaseUrl})\n` : '')
                });

                console.log(`✅ Issue #${issueNumber} updated and closed.`);
              } catch (err) {
                console.error(`❌ Error updating issue #${issueNumber}:`, err.message);
              }
            }
